apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    app: redis-deploy
  namespace: voting-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis-db
        image: redis:alpine      
        ports:
        - containerPort: 6379

        volumeMounts:
          - name: redis
            mountPath: /data

      volumes:
        - name: redis
          emptyDir: {}


