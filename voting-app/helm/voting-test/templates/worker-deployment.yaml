apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
  labels:
    app: worker-deploy
  namespace: voting-app

spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: worker

  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: backend-worker
        image: {{ .Values.worker.image }}
        ports:
        - containerPort: {{ .Values.worker.containerPort }}

