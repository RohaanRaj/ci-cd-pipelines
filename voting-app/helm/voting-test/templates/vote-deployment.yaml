apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
  labels:
    app: vote-deploy
  namespace: voting-app

spec:
  replicas: {{ .Values.vote.replicaCount }}
  selector:
    matchLabels:
      app: vote

  template:
    metadata:
      labels:
        app: vote 
    spec:
      containers:
      - name: frontend-vote
        image: {{ .Values.vote.image }}
        ports:
        - containerPort: {{.Values.vote.containerPort }}


