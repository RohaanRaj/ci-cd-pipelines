version: 0.2

env:
  parameter-store:
    DOCKER_USERNAME: /dockerhub/username
    DOCKER_PASSWORD: /dockerhub/password
    DOCKER_URL: /dockerhub/dockerURL

phases:
  install:
    runtime-versions:
      python: 3.11

  pre_build:
    commands:
      - echo "Installing dependencies"
      - pip install -r day-14/simple-python-app/requirements.txt
      
  build:
    commands:
      - echo "changing directories"
      - cd day-14/simple-python-app/
      - echo "authenticating docker"
      - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin "$DOCKER_URL"
      - docker build -t "$DOCKER_URL/rohaanraj/testing-codebuild:latest" .
      - docker push "$DOCKER_URL/rohaanraj/testing-codebuild:latest"
    
  post_build:
    commands:
      - echo "Build completed yayy!"
      

